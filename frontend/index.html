<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AASIAM | Loja Oficial</title>
    <meta name="description" content="Loja oficial da Atlética de Sistemas de Informação" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      // Apply persisted theme before first paint — prevents flash
      const saved = localStorage.getItem("aasiam-theme");
      if (saved === "light") document.documentElement.classList.replace("dark", "light");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
