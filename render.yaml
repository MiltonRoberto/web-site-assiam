services:
  - type: web
    name: aasiam-backend
    runtime: node
    buildCommand: npm install
    startCommand: node backend/index.js
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: PORT
        value: 3000
      - key: APP_URL
        sync: false   # URL do frontend na Vercel (ex: https://seu-app.vercel.app)
      - key: API_URL
        sync: false   # URL do próprio backend no Render (ex: https://seu-app.onrender.com)
      - key: INFINITEPAY_HANDLE
        sync: false   # Slug da conta InfinitePay
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false   # ID da planilha Google Sheets
      - key: GOOGLE_SHEETS_SHEET_NAME
        value: Pedidos AASIAM
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false   # E-mail da Service Account do Google
      - key: GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
        sync: false   # Chave privada PEM com \n escapados
